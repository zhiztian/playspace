<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Piano Falling Notes - 原型</title>
<script src="https://cdn.jsdelivr.net/npm/tone@14.8.49/build/Tone.js"></script>
<style>
  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #070912;
    color: #e5e7eb;
    font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  body {
    background:
      radial-gradient(circle at 18% 0%, rgba(34, 211, 238, 0.16), transparent 34%),
      radial-gradient(circle at 82% 8%, rgba(168, 85, 247, 0.14), transparent 32%),
      linear-gradient(180deg, #060814 0%, #0b1020 48%, #070912 100%);
  }

  #status {
    height: 42px;
    padding: 8px 14px;
    background: rgba(7, 10, 22, 0.86);
    border-bottom: 1px solid rgba(148, 163, 184, 0.16);
    box-shadow: 0 8px 28px rgba(0, 0, 0, 0.28);
    backdrop-filter: blur(12px);
    font-size: 13px;
    line-height: 1;
    display: flex;
    gap: 16px;
    align-items: center;
    color: #cbd5e1;
    user-select: none;
  }

  #status .ok {
    color: #4ade80;
    text-shadow: 0 0 12px rgba(74, 222, 128, 0.35);
  }

  #status .err {
    color: #fb7185;
    text-shadow: 0 0 12px rgba(251, 113, 133, 0.32);
  }

  button {
    appearance: none;
    border: 1px solid rgba(125, 211, 252, 0.38);
    border-radius: 999px;
    padding: 7px 16px;
    color: #eff6ff;
    font-weight: 700;
    letter-spacing: 0.01em;
    cursor: pointer;
    background:
      linear-gradient(180deg, rgba(56, 189, 248, 0.95), rgba(37, 99, 235, 0.95));
    box-shadow:
      0 0 0 1px rgba(255, 255, 255, 0.08) inset,
      0 8px 22px rgba(37, 99, 235, 0.25),
      0 0 24px rgba(34, 211, 238, 0.16);
    transition: transform 120ms ease, filter 120ms ease, box-shadow 120ms ease;
  }

  button:hover {
    filter: brightness(1.08);
    transform: translateY(-1px);
    box-shadow:
      0 0 0 1px rgba(255, 255, 255, 0.12) inset,
      0 10px 26px rgba(37, 99, 235, 0.32),
      0 0 30px rgba(34, 211, 238, 0.22);
  }

  button:active {
    transform: translateY(0);
    filter: brightness(0.96);
  }

  #score {
    margin-left: auto;
    font-size: 16px;
    font-weight: 800;
    color: #f8fafc;
    letter-spacing: 0.02em;
    text-shadow: 0 0 18px rgba(250, 204, 21, 0.18);
  }

  #stage {
    position: relative;
    width: 100vw;
    height: calc(100vh - 42px);
    background: #070912;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }
</style>
</head>
<body>

<div id="status">
  <span id="midi-status">MIDI: 未连接</span>
  <span id="device-name"></span>
  <span id="audio-status">音色: 加载中…</span>
  <button id="start">▶ 开始</button>
  <span id="score">分数: 0  |  Hit: 0  Miss: 0</span>
</div>

<div id="stage">
  <canvas id="game"></canvas>
</div>

<script>
// ---------- 配置 ----------
const FIRST_MIDI = 48;   // C3
const LAST_MIDI  = 84;   // C6  (37 个键, 含黑键)
const FALL_SECONDS = 2.5; // 音符从顶端落到判定线的耗时
const HIT_WINDOW_MS = 150; // 命中容差(毫秒)
const KEYBOARD_HEIGHT = 120;

// 欢乐颂 (贝多芬第九): [midi, beat 起始, 拍长]  4/4, 1 拍 = 0.5s
// 全部白键 C 大调, E F G + 偶尔 D C, 级进为主
const SONG = [
  // E E F G | G F E D | C C D E | E. D D
  [64,0,1],[64,1,1],[65,2,1],[67,3,1],
  [67,4,1],[65,5,1],[64,6,1],[62,7,1],
  [60,8,1],[60,9,1],[62,10,1],[64,11,1],
  [64,12,1.5],[62,13.5,0.5],[62,14,2],
  // 重复
  [64,16,1],[64,17,1],[65,18,1],[67,19,1],
  [67,20,1],[65,21,1],[64,22,1],[62,23,1],
  [60,24,1],[60,25,1],[62,26,1],[64,27,1],
  [62,28,1.5],[60,29.5,0.5],[60,30,2],
];
const BEAT_SEC = 0.5;
const NOTES = SONG.map(([m, b, d]) => ({ midi: m, t: b * BEAT_SEC, dur: d * BEAT_SEC, hit: false, missed: false }));

// ---------- 键盘几何 ----------
const BLACK_SET = new Set([1, 3, 6, 8, 10]); // 半音里的黑键 (C=0)
const isBlack = (m) => BLACK_SET.has(m % 12);

function buildKeyLayout(width) {
  // 先算白键数, 均分宽度; 黑键叠在白键交界处
  const whites = [];
  for (let m = FIRST_MIDI; m <= LAST_MIDI; m++) if (!isBlack(m)) whites.push(m);
  const wKeyW = width / whites.length;
  const keys = {}; // midi -> {x,w,black}
  whites.forEach((m, i) => { keys[m] = { x: i * wKeyW, w: wKeyW, black: false }; });
  for (let m = FIRST_MIDI; m <= LAST_MIDI; m++) {
    if (!isBlack(m)) continue;
    // 找它左边那个白键
    let left = m - 1;
    while (isBlack(left)) left--;
    if (keys[left]) {
      const bw = wKeyW * 0.6;
      keys[m] = { x: keys[left].x + wKeyW - bw / 2, w: bw, black: true };
    }
  }
  return { keys, whiteWidth: wKeyW };
}

// ---------- 渲染 ----------
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let layout;
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = document.getElementById('stage').clientHeight;
  layout = buildKeyLayout(canvas.width);
}
window.addEventListener('resize', resize);
resize();

const pressed = new Set(); // 当前按下的 midi 键
let started = false;
let startTime = 0;
let score = 0, hits = 0, misses = 0;

function midiInRange(m) { return m >= FIRST_MIDI && m <= LAST_MIDI; }

function draw() {
  const W = canvas.width, H = canvas.height;
  const hitLineY = H - KEYBOARD_HEIGHT;
  const fallH = hitLineY;
  const pxPerSec = fallH / FALL_SECONDS;
  const now = started ? (performance.now() / 1000 - startTime) : -FALL_SECONDS;

  const clamp = (v, a, b) => Math.max(a, Math.min(b, v));

  const roundedRect = (x, y, w, h, r) => {
    r = clamp(r, 0, Math.min(w, h) / 2);
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  };

  const bottomRoundRect = (x, y, w, h, r) => {
    r = clamp(r, 0, Math.min(w, h) / 2);
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x + w, y);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.closePath();
  };

  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = 'source-over';
  ctx.shadowBlur = 0;
  ctx.shadowColor = 'transparent';
  ctx.clearRect(0, 0, W, H);

  // Backdrop
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#080b18');
  bg.addColorStop(0.48, '#0d1428');
  bg.addColorStop(1, '#050711');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  let orb = ctx.createRadialGradient(W * 0.18, H * 0.08, 0, W * 0.18, H * 0.08, W * 0.45);
  orb.addColorStop(0, 'rgba(34, 211, 238, 0.12)');
  orb.addColorStop(1, 'rgba(34, 211, 238, 0)');
  ctx.fillStyle = orb;
  ctx.fillRect(0, 0, W, H);

  orb = ctx.createRadialGradient(W * 0.82, H * 0.16, 0, W * 0.82, H * 0.16, W * 0.42);
  orb.addColorStop(0, 'rgba(168, 85, 247, 0.12)');
  orb.addColorStop(1, 'rgba(168, 85, 247, 0)');
  ctx.fillStyle = orb;
  ctx.fillRect(0, 0, W, H);
  ctx.restore();

  // Subtle vertical lane guides
  for (const mStr in layout.keys) {
    const m = +mStr;
    const k = layout.keys[m];
    if (k.black) continue;

    const lane = ctx.createLinearGradient(0, 0, 0, hitLineY);
    lane.addColorStop(0, (m % 24 === 0) ? 'rgba(56, 189, 248, 0.055)' : 'rgba(255, 255, 255, 0.026)');
    lane.addColorStop(0.72, 'rgba(255, 255, 255, 0.012)');
    lane.addColorStop(1, 'rgba(250, 204, 21, 0.028)');
    ctx.fillStyle = lane;
    ctx.fillRect(k.x, 0, k.w, hitLineY);

    ctx.strokeStyle = 'rgba(148, 163, 184, 0.075)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(k.x + 0.5, 0);
    ctx.lineTo(k.x + 0.5, hitLineY);
    ctx.stroke();
  }

  for (const mStr in layout.keys) {
    const k = layout.keys[mStr];
    if (!k.black) continue;

    ctx.fillStyle = 'rgba(2, 6, 23, 0.18)';
    ctx.fillRect(k.x, 0, k.w, hitLineY);

    ctx.strokeStyle = 'rgba(168, 85, 247, 0.075)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(k.x + k.w * 0.5, 0);
    ctx.lineTo(k.x + k.w * 0.5, hitLineY);
    ctx.stroke();
  }

  // Faint depth grid
  ctx.save();
  ctx.globalAlpha = 0.22;
  ctx.strokeStyle = 'rgba(148, 163, 184, 0.08)';
  ctx.lineWidth = 1;
  const gridStep = Math.max(42, hitLineY / 12);
  for (let y = hitLineY % gridStep; y < hitLineY; y += gridStep) {
    ctx.beginPath();
    ctx.moveTo(0, y + 0.5);
    ctx.lineTo(W, y + 0.5);
    ctx.stroke();
  }
  ctx.restore();

  // Falling notes
  for (const note of NOTES) {
    if (!midiInRange(note.midi)) continue;
    const k = layout.keys[note.midi];
    if (!k) continue;

    const dy = (note.t - now) * pxPerSec;
    const noteH = Math.max(3, note.dur * pxPerSec);
    const y = hitLineY - dy - noteH;
    if (y > H || y + noteH < 0) continue;

    const isBlk = k.black;
    const x = k.x + (isBlk ? 1.5 : 2.5);
    const w = Math.max(3, k.w - (isBlk ? 3 : 5));
    const r = Math.min(9, w * 0.34, noteH * 0.28);

    let top, mid, bot, stroke, glow, alpha = 1;
    if (note.hit) {
      top = '#bbf7d0';
      mid = '#4ade80';
      bot = '#15803d';
      stroke = 'rgba(187, 247, 208, 0.82)';
      glow = 'rgba(74, 222, 128, 0.58)';
    } else if (note.missed) {
      top = '#64748b';
      mid = '#3f4857';
      bot = '#1f2937';
      stroke = 'rgba(148, 163, 184, 0.28)';
      glow = 'rgba(100, 116, 139, 0.18)';
      alpha = 0.58;
    } else if (isBlk) {
      top = '#e9d5ff';
      mid = '#a855f7';
      bot = '#6d28d9';
      stroke = 'rgba(216, 180, 254, 0.78)';
      glow = 'rgba(168, 85, 247, 0.54)';
    } else {
      top = '#cffafe';
      mid = '#22d3ee';
      bot = '#2563eb';
      stroke = 'rgba(125, 211, 252, 0.78)';
      glow = 'rgba(34, 211, 238, 0.50)';
    }

    const distToHit = Math.abs((y + noteH) - hitLineY);
    const nearHit = clamp(1 - distToHit / 190, 0, 1);

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.shadowColor = glow;
    ctx.shadowBlur = 8 + nearHit * 24;
    ctx.shadowOffsetY = 2 + nearHit * 5;

    const g = ctx.createLinearGradient(0, y, 0, y + noteH);
    g.addColorStop(0, top);
    g.addColorStop(0.18, mid);
    g.addColorStop(1, bot);

    roundedRect(x, y, w, noteH, r);
    ctx.fillStyle = g;
    ctx.fill();

    ctx.shadowBlur = 0;
    ctx.lineWidth = 1;
    ctx.strokeStyle = stroke;
    ctx.stroke();

    roundedRect(x + 1.5, y + 1.5, Math.max(0, w - 3), Math.max(0, noteH - 3), Math.max(0, r - 2));
    ctx.clip();

    const shine = ctx.createLinearGradient(0, y, 0, y + Math.min(noteH, 34));
    shine.addColorStop(0, 'rgba(255, 255, 255, 0.34)');
    shine.addColorStop(1, 'rgba(255, 255, 255, 0)');
    ctx.fillStyle = shine;
    ctx.fillRect(x + 2, y + 2, w - 4, Math.min(noteH * 0.42, 36));

    const edge = ctx.createLinearGradient(x, 0, x + w, 0);
    edge.addColorStop(0, 'rgba(255, 255, 255, 0.28)');
    edge.addColorStop(0.16, 'rgba(255, 255, 255, 0.06)');
    edge.addColorStop(1, 'rgba(0, 0, 0, 0.12)');
    ctx.fillStyle = edge;
    ctx.fillRect(x + 1, y + 2, Math.max(1, w - 2), Math.max(1, noteH - 4));

    ctx.restore();
  }

  // Hit line glow
  const hitGlow = ctx.createLinearGradient(0, hitLineY - 20, 0, hitLineY + 14);
  hitGlow.addColorStop(0, 'rgba(245, 158, 11, 0)');
  hitGlow.addColorStop(0.52, 'rgba(245, 158, 11, 0.24)');
  hitGlow.addColorStop(1, 'rgba(245, 158, 11, 0)');
  ctx.fillStyle = hitGlow;
  ctx.fillRect(0, hitLineY - 20, W, 34);

  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  ctx.shadowColor = 'rgba(251, 191, 36, 0.85)';
  ctx.shadowBlur = 18;
  ctx.strokeStyle = 'rgba(245, 158, 11, 0.95)';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(0, hitLineY + 0.5);
  ctx.lineTo(W, hitLineY + 0.5);
  ctx.stroke();

  ctx.shadowBlur = 0;
  ctx.strokeStyle = 'rgba(254, 243, 199, 0.92)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, hitLineY - 1.5);
  ctx.lineTo(W, hitLineY - 1.5);
  ctx.stroke();
  ctx.restore();

  // Press glows behind keys
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  for (const mStr in layout.keys) {
    const m = +mStr;
    if (!pressed.has(m)) continue;
    const k = layout.keys[m];
    const cx = k.x + k.w * 0.5;
    const glowH = k.black ? KEYBOARD_HEIGHT * 0.82 : KEYBOARD_HEIGHT * 1.05;
    const rg = ctx.createRadialGradient(cx, hitLineY + 8, 0, cx, hitLineY + 8, Math.max(k.w * 2.2, glowH * 0.72));
    rg.addColorStop(0, k.black ? 'rgba(168, 85, 247, 0.50)' : 'rgba(34, 211, 238, 0.42)');
    rg.addColorStop(0.42, 'rgba(250, 204, 21, 0.18)');
    rg.addColorStop(1, 'rgba(250, 204, 21, 0)');
    ctx.fillStyle = rg;
    ctx.fillRect(k.x - k.w * 2, hitLineY - 34, k.w * 5, glowH + 48);
  }
  ctx.restore();

  // White keys
  for (const mStr in layout.keys) {
    const m = +mStr;
    const k = layout.keys[m];
    if (k.black) continue;

    const down = pressed.has(m);
    const keyX = k.x + 0.5;
    const keyY = hitLineY;
    const keyW = Math.max(1, k.w - 1);
    const keyH = KEYBOARD_HEIGHT - 0.5;

    const kg = ctx.createLinearGradient(0, keyY, 0, keyY + keyH);
    if (down) {
      kg.addColorStop(0, '#fff7d6');
      kg.addColorStop(0.44, '#fde68a');
      kg.addColorStop(1, '#f59e0b');
    } else {
      kg.addColorStop(0, '#ffffff');
      kg.addColorStop(0.18, '#f8fafc');
      kg.addColorStop(0.7, '#dce3ee');
      kg.addColorStop(1, '#aeb8c8');
    }

    bottomRoundRect(keyX, keyY, keyW, keyH, 7);
    ctx.fillStyle = kg;
    ctx.fill();

    ctx.lineWidth = 1;
    ctx.strokeStyle = down ? 'rgba(251, 191, 36, 0.95)' : 'rgba(15, 23, 42, 0.36)';
    ctx.stroke();

    ctx.fillStyle = down ? 'rgba(255, 255, 255, 0.38)' : 'rgba(255, 255, 255, 0.56)';
    ctx.fillRect(keyX + 2, keyY + 5, Math.max(0, keyW - 4), 2);

    const side = ctx.createLinearGradient(keyX, 0, keyX + keyW, 0);
    side.addColorStop(0, 'rgba(15, 23, 42, 0.18)');
    side.addColorStop(0.08, 'rgba(255, 255, 255, 0.18)');
    side.addColorStop(0.9, 'rgba(255, 255, 255, 0.10)');
    side.addColorStop(1, 'rgba(15, 23, 42, 0.24)');
    ctx.fillStyle = side;
    ctx.fillRect(keyX, keyY, keyW, keyH);

    ctx.fillStyle = down ? 'rgba(120, 53, 15, 0.22)' : 'rgba(15, 23, 42, 0.20)';
    ctx.fillRect(keyX + 1, keyY + keyH - 9, keyW - 2, 8);

    if (m % 12 === 0) {
      ctx.save();
      ctx.font = '700 10px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
      ctx.textBaseline = 'alphabetic';
      ctx.textAlign = 'left';
      ctx.fillStyle = down ? 'rgba(92, 53, 10, 0.82)' : 'rgba(71, 85, 105, 0.88)';
      ctx.shadowColor = 'rgba(255, 255, 255, 0.55)';
      ctx.shadowBlur = 2;
      ctx.fillText('C' + (Math.floor(m / 12) - 1), k.x + 5, hitLineY + KEYBOARD_HEIGHT - 9);
      ctx.restore();
    }
  }

  // Black keys on top
  for (const mStr in layout.keys) {
    const m = +mStr;
    const k = layout.keys[m];
    if (!k.black) continue;

    const down = pressed.has(m);
    const keyX = k.x + 0.5;
    const keyY = hitLineY;
    const keyW = Math.max(1, k.w - 1);
    const keyH = KEYBOARD_HEIGHT * 0.65;

    ctx.save();
    ctx.shadowColor = 'rgba(0, 0, 0, 0.55)';
    ctx.shadowBlur = 10;
    ctx.shadowOffsetY = 5;

    const kg = ctx.createLinearGradient(0, keyY, 0, keyY + keyH);
    if (down) {
      kg.addColorStop(0, '#f5d0fe');
      kg.addColorStop(0.22, '#c084fc');
      kg.addColorStop(0.72, '#7c3aed');
      kg.addColorStop(1, '#3b0764');
    } else {
      kg.addColorStop(0, '#3b4354');
      kg.addColorStop(0.18, '#1f2937');
      kg.addColorStop(0.72, '#070a12');
      kg.addColorStop(1, '#01030a');
    }

    bottomRoundRect(keyX, keyY, keyW, keyH, 6);
    ctx.fillStyle = kg;
    ctx.fill();

    ctx.shadowBlur = 0;
    ctx.lineWidth = 1;
    ctx.strokeStyle = down ? 'rgba(216, 180, 254, 0.92)' : 'rgba(148, 163, 184, 0.20)';
    ctx.stroke();

    ctx.fillStyle = down ? 'rgba(255, 255, 255, 0.26)' : 'rgba(255, 255, 255, 0.13)';
    ctx.fillRect(keyX + 2, keyY + 5, Math.max(0, keyW - 4), 2);

    const bevel = ctx.createLinearGradient(keyX, 0, keyX + keyW, 0);
    bevel.addColorStop(0, 'rgba(255, 255, 255, 0.14)');
    bevel.addColorStop(0.18, 'rgba(255, 255, 255, 0.02)');
    bevel.addColorStop(0.82, 'rgba(0, 0, 0, 0.22)');
    bevel.addColorStop(1, 'rgba(255, 255, 255, 0.08)');
    ctx.fillStyle = bevel;
    ctx.fillRect(keyX + 1, keyY + 1, keyW - 2, keyH - 2);

    ctx.fillStyle = down ? 'rgba(250, 204, 21, 0.24)' : 'rgba(0, 0, 0, 0.32)';
    ctx.fillRect(keyX + 2, keyY + keyH - 8, keyW - 4, 6);

    ctx.restore();
  }

  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = 'source-over';
  ctx.shadowBlur = 0;
  ctx.shadowColor = 'transparent';

  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);

// ---------- 判定 ----------
function tryHit(midi) {
  const now = performance.now() / 1000 - startTime;
  // 找最近的未命中音符 (容差窗口内)
  let best = null, bestDt = Infinity;
  for (const n of NOTES) {
    if (n.hit || n.missed || n.midi !== midi) continue;
    const dt = Math.abs(n.t - now) * 1000; // ms
    if (dt < bestDt && dt <= HIT_WINDOW_MS) { bestDt = dt; best = n; }
  }
  if (best) {
    best.hit = true;
    hits++; score += Math.round(100 - bestDt);
  } else {
    misses++; score = Math.max(0, score - 20);
  }
  updateScore();
}

// 标记错过的音符
setInterval(() => {
  if (!started) return;
  const now = performance.now() / 1000 - startTime;
  for (const n of NOTES) {
    if (!n.hit && !n.missed && n.t < now - HIT_WINDOW_MS / 1000) {
      n.missed = true; misses++; updateScore();
    }
  }
}, 100);

function updateScore() {
  document.getElementById('score').textContent = `分数: ${score}  |  Hit: ${hits}  Miss: ${misses}`;
}

// ---------- 音频 (Salamander Grand Piano 采样) ----------
let piano = null;
let pianoLoaded = false;
const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const midiToNoteName = (m) => NOTE_NAMES[m % 12] + (Math.floor(m / 12) - 1);
const audioStatusEl = document.getElementById('audio-status');

function initPiano() {
  if (piano) return;
  // 加一点混响, 让钢琴更有空间感
  const reverb = new Tone.Reverb({ decay: 2.2, wet: 0.18 }).toDestination();
  piano = new Tone.Sampler({
    urls: {
      A0: "A0.mp3", C1: "C1.mp3", "D#1": "Ds1.mp3", "F#1": "Fs1.mp3", A1: "A1.mp3",
      C2: "C2.mp3", "D#2": "Ds2.mp3", "F#2": "Fs2.mp3", A2: "A2.mp3",
      C3: "C3.mp3", "D#3": "Ds3.mp3", "F#3": "Fs3.mp3", A3: "A3.mp3",
      C4: "C4.mp3", "D#4": "Ds4.mp3", "F#4": "Fs4.mp3", A4: "A4.mp3",
      C5: "C5.mp3", "D#5": "Ds5.mp3", "F#5": "Fs5.mp3", A5: "A5.mp3",
      C6: "C6.mp3", "D#6": "Ds6.mp3", "F#6": "Fs6.mp3", A6: "A6.mp3",
      C7: "C7.mp3", "D#7": "Ds7.mp3", "F#7": "Fs7.mp3", A7: "A7.mp3",
      C8: "C8.mp3"
    },
    release: 1.2,
    baseUrl: "https://tonejs.github.io/audio/salamander/",
    onload: () => {
      pianoLoaded = true;
      audioStatusEl.textContent = '音色: 已加载';
      audioStatusEl.className = 'ok';
    },
    onerror: (e) => {
      audioStatusEl.textContent = '音色: 加载失败 (检查网络)';
      audioStatusEl.className = 'err';
    }
  }).connect(reverb);
}
// 立即开始下载采样, 不等用户点 Start
initPiano();

function ensureAudio() {
  if (typeof Tone !== 'undefined' && Tone.context.state !== 'running') Tone.start();
}

function audioOn(midi, velocity = 0.6) {
  if (!piano || !pianoLoaded) return;
  piano.triggerAttack(midiToNoteName(midi), undefined, Math.max(0.05, Math.min(1, velocity)));
}
function audioOff(midi) {
  if (!piano || !pianoLoaded) return;
  piano.triggerRelease(midiToNoteName(midi));
}

// ---------- MIDI ----------
const midiStatus = document.getElementById('midi-status');
const deviceName = document.getElementById('device-name');

if (!navigator.requestMIDIAccess) {
  midiStatus.textContent = 'MIDI: 浏览器不支持 Web MIDI (用 Chrome/Edge)';
  midiStatus.className = 'err';
} else {
  navigator.requestMIDIAccess().then((access) => {
    const refresh = () => {
      const inputs = [...access.inputs.values()];
      if (inputs.length === 0) {
        midiStatus.textContent = 'MIDI: 未检测到设备';
        midiStatus.className = 'err';
        deviceName.textContent = '';
      } else {
        midiStatus.textContent = 'MIDI: 已连接';
        midiStatus.className = 'ok';
        deviceName.textContent = inputs.map(i => i.name).join(', ');
        for (const inp of inputs) inp.onmidimessage = onMidi;
      }
    };
    access.onstatechange = refresh;
    refresh();
  }, (err) => {
    midiStatus.textContent = 'MIDI: 请求失败 ' + err;
    midiStatus.className = 'err';
  });
}

function onMidi(ev) {
  const [status, data1, data2] = ev.data;
  const cmd = status & 0xf0;
  if (cmd === 0x90 && data2 > 0) { // note on
    pressed.add(data1);
    audioOn(data1, data2 / 127);
    if (started) tryHit(data1);
  } else if (cmd === 0x80 || (cmd === 0x90 && data2 === 0)) { // note off
    pressed.delete(data1);
    audioOff(data1);
  }
}

// 键盘当 MIDI 测试 (没有电钢时也能玩): A S D F G H J = C D E F G A B
const KEY_MAP = { a: 60, w: 61, s: 62, e: 63, d: 64, f: 65, t: 66, g: 67, y: 68, h: 69, u: 70, j: 71, k: 72 };
window.addEventListener('keydown', (e) => {
  const m = KEY_MAP[e.key]; if (!m || e.repeat) return;
  ensureAudio();
  pressed.add(m); audioOn(m, 0.6); if (started) tryHit(m);
});
window.addEventListener('keyup', (e) => {
  const m = KEY_MAP[e.key]; if (!m) return;
  pressed.delete(m); audioOff(m);
});

// ---------- 开始 ----------
document.getElementById('start').onclick = () => {
  ensureAudio();
  // 重置
  for (const n of NOTES) { n.hit = false; n.missed = false; }
  score = 0; hits = 0; misses = 0; updateScore();
  started = true;
  startTime = performance.now() / 1000 + FALL_SECONDS; // 让第一个音符从顶端开始下落
};
</script>
</body>
